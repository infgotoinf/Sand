name: Autotest
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs: 
  build-project:
    runs-on: ubuntu-24.04
    
    name: Sand
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'
        
      - name: Install Docker
        run: sudo apt-get update && sudo apt install -y docker-cli docker-buildx
        
      - name: Prepare Docker Image
        run: docker build -t sand-image . && docker run -d -it --rm --name sand-container sand-image sleep infinity
      
      - name: Generate Inside Docker
        run: docker exec -i sand-container cmake -B build -DBUILD_TESTING=ON

      - name: Build Inside Docker
        run: docker exec -i sand-container cmake --build build
        
      - name: Run Tests
        run: docker exec -i sand-container build/Debug/game_test -d yes
        
      - name: Clean
        if: always()
        run: docker stop sand-container && docker rmi -f sand-image
